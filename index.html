<!DOCTYPE html>
<html>
<head>
  <title>Gym Tracker</title>
</head>
<body>
  <h1>Select User</h1>

  <button onclick="selectUser('elina')">Elina</button>
  <button onclick="selectUser('alex')">Alex</button>

  <script>
    function selectUser(user) {
      localStorage.setItem("currentUser", user);
      window.location.href = "user.html";
    }
  </script>
</body>
</html>
